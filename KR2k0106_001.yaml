body:
  text: 北户錄卷一唐段公路撰龜圖註通犀通犀山海經云犀似水牛而猪頭脚似象有三蹄大腹黑色三角一在頂上一在額上一在鼻上鼻上小而不橢又云鼻上者良韓詩外𫝊曰太公使南宫括至義渠得駭雞犀獻紂犀角二一在頂上一在鼻上鼻上者食角也今人呼為胡犀是也抱朴子云犀解於山中人以木如其角代之犀不覺後年輒解也又南州異物志曰獸曰𤣥犀處自林麓食唯棘刺體兼五肉又含精吐烈望如華燭置之荒野禽獸莫觸置大霧重露下終不沾濡又堪為釵纛又見吳均續齊諧記蔣潜得通犀纛後被豫章王江夫人斷以為釵兼名逺花又云宋岑獲通犀纛賣與廬陵王義真又元康末婦人以犀角瑇瑁為斧鉞戈㦸戴之明也撓藥酒酒生沫若貯米飼雞雞見輒驚散一呼為駭雞犀駭雞犀岀大秦又有離水犀行則水為之開或中箭刺於創中立愈蓋犀食百毒棘刺故也愚重譯於蕃人事皆不虚廣志云犀角之好者稱雞脉白郭子横云又犀角表有光因名明犀置閤中有影色今廣州有善理犀者能補白犀東觀漢記曰章帝元和元年日南獻白雉白犀補了以鐡夾夾定藥水煮而拍之膠為一體製梳掌多作禽魚隨意匠物論其妙至於鑄玉者方之蔑如也又有裁龜甲或觜􅏲斷日脚者陷黑玳瑁為斑㸃者亦以鐡夾煮而用之為腰帶襯疊子之類其焙浄真者不及也玳瑁切韻字從玉文選字從虫歐陽詢飛白從甲愚以甲為是字話亦從甲也凡玳瑁甲生取者治毒第一其力不下婆薩石愚曾取解毒立驗南人神之亦甚辟惡與符拔甲相類廣志云符拔如麟畢皮有麟甲甲以辟惡也孔雀媒雷羅數州収孔雀雛養之使極馴擾致於山野間以物絆足傍施網羅伺野孔雀至即倒網掩之舉無遺者或生折翠羽以珠刀毛編為簾子拂子之屬粲然可觀真神禽也又後魏書龜兹國孔雀羣飛山谷間人取養而食之字乳如雞鶩其王家恒千餘隻一說孔雀不疋偶但音影相接便有孕如白鶂雄雌相視則孕或曰雄鳴上風雌鳴下風亦孕見博物志又淮南八公相鵠經曰復百六十年變止雌雄相視目睛不轉而孕千六百年形定也又稽聖賦豪豕自為雌雄缺鼻曾無牝牡即雌兔䑛雄而孕是矣又周書曰成王時方人獻孔鳥方亦戎别名山海經南方孔鳥郭璞注孔雀也宋紀曰孝武大明五年有郡獻白孔雀為瑞者噫象以齒而焚麝因香而死今孔雀亦以羽毛為累得不悲夫愚按說文曰率鳥者繫生鳥以來之名曰㘥字林音由今獵師有㘥也淮南萬畢術曰鴟鵂致鳥注云取鴟鵂折其大羽絆其兩足以為媒張羅其旁衆鳥聚矣博物志又云鵂鶹休留鳥一名鴟鵂晝日無所見夜則目至明莊子云鴟鵂夜撮蚤察毫末晝岀冥目而不見丘山言性殊也人截手爪弃露地此鳥夜至人家拾取視之則知有吉㐫㐫者輙更鳴其家有殃也陳藏器引五行書除手爪埋之户内恐為此鳥所得其鵂鶹即姑獲鬼車鴞鵩類也姑獲𤣥中記云夜飛晝藏一名天帝少女一名夜行遊女一名隠飛好取人小兒食之今時小兒之衣不欲夜露者為此物愛以血㸃其衣為誌即取小兒也又云衣毛為鳥脫毛為女人昔豫章男子見田中有六七女人不知是鳥扶匐往先得其所解毛即藏之即往就諸鳥各走取毛衣飛去一鳥獨不去男子取為婦生三女其母後使女問父知衣在積稻下得之衣而飛去後以衣迎三女兒得衣亦飛去鬼車一名鬼鳥今猶九首能入人屋収魂氣為犬所噬一首常下血滴人家則㐫荆楚嵗時記夜聞之捩狗耳言其畏狗也白澤圖云昔孔子子夏所見故歌之其圖九首今呼為九頭鳥也毛詩義䟽曰鴞大如鳩惡聲鳥入人家㐫其肉甚美可為炙漢供御物各隨其時唯鴞冬夏施之以美也禮内則曰鴞胖莊子云見彈求鴞炙陳藏器又云古人重其炙尚肥美也又按說文曰梟不孝鳥至日捕梟磔之如淳曰漢使東郡送梟五月五日作梟羮賜百官以其惡鳥故食之愚謂古人尚鴞炙是意欲滅其族非為其美也又淮南萬畢術甑瓦止梟鳴取破甑向梟抵之輙自止也鷓鴣衡州南多鷓鴣解嶺南野葛諸菌毒及辟温瘴前臆文為白圓㸃又一名樢音述多對啼每啼連轉數音其韻甚髙廣志言遮姑鳴云但南不北如逃閭聲云懸壺盧繫頸古今注云其鳴自呼常向日飛畏霜早晚稀岀宿即以樹葉覆其身上也南越志云鷓鴣充鳥也雖復東西廻翔然而命翮之始必也南翥其鳴自號杜薄州食之亡癘此三說啼處豈同於牛屋辯哉唯本草說鳴云鈎輈格磔竹客反小類鸚鵡瘴廣之南新勤春十州呼為南道多鸚鵡字林鸚鵡書作䳇字又江表傳曰孫權曾大㑹有白頭鳥集殿前權曰此何鳥諸葛恪對曰白頭公張昭自以坐中最老疑恪戯之因曰未聞鳥名白頭公請使諸葛復索白頭姥恪曰鳥名鸚母未必有對請使輔吳復求鸚父也又說文鸚從鳥嬰聲䳇從鳥母聲又曲禮鸚鵡能言不離飛鳥又山海經云數歴之山其鳥鸚鵡又云廣山有之舌似小兒舌脚指前後各兩指扶南徼外有五色純白純赤者翠衿丹觜巧解人言有鳴曲子如喉轉者但小不及於隴右毎飛則數千百頭南史云天竺迦昆利國元嘉五年獻赤白鸚鵡各一頭又漢獻帝𫝊曰興平元年益州蠻夷獻鸚鵡三枚各食三升麻子云此鳥有損無益詔歸本土食朩葉榕實凡養之俗忌以手頻觸其背犯者即多病顫而卒土人謂為鸚鵡瘴愚親驗之咸通十年夏初有三朩舶將五色鸚鵡至者南方異物志鸚鵡有三種青者大如烏臼白者大如鵝五色者大於青者五色者岀杜薄州也雖繡羽錦衣而病其胡語昔天監年交州有獻能歌鸚鵡者詔亦不納人張華有白鸚鵡華每行還輙說童吏善惡後寂然無言華問其故鳥云見藏瓮中何由得知華在外令呼鸚鵡鸚鵡曰昨夜夢惡不宜岀户華猶强之至庭為鸇所獲人教其啄鸇脚僅而獲免又幽明錄晉司空桓豁在荆州有㕘軍剪五月五日鴝鵒舌教令學語遂善能效人語笑聲司空大㑹吏佐令悉效四座語無不絶似有一佐齆鼻語難學學之未似因内頭於瓮中以效焉遂不異也後主典人盜牛肉鴝鵒白叅軍叅軍曰汝云盜盜肉當應有驗鴝鵒曰以新荷裏著屏風後檢之果獲而盜者怨患以熱湯灌殺之叅軍為之悲傷累日遂請殺此人司空曰不可以禽鳥故而極之於法令止五嵗刑也又淮南萬畢術云寒臯斷舌可使語寒臯一曰鴝鵒赤白吉了某年普寧有亷州民獲赤白吉了各一頭獻於刺史者其赤者尋卒白者乆而能言凡笑語悉皆斆人斯珍禽也吉了身黑觜赤首戴黄冠善斆人笑言聲明切於鸚鵡好食雞子飯也愚按雲物上瑞鳥獸中瑞草朩下瑞夫聖人至徳所臨則嘉祥必見故前有引赤雀白雀赤烏白烏赤鷰白鷰之流衆矣瑞應圖曰赤雀瑞鳥也云云又孫氏曰王者奉巳儉約尊事耆老則見秦繆公岀狩至于咸陽日稷庚午天震大雷有火下化為白雀銜緑丹書集公車公俯取其書言繆公之覇訖胡亥秦家世事又禮稽命徴曰得禮之制澤谷之中有赤烏焉孝經援神契曰徳至鳥獸則白烏下又熊氏瑞應圖曰王者八要有序經緯不差應時之性命則赤鷰銜丹書而至白鷰事略同也愚又見顧野王以逺方所貢赤白鸚鵡編為瑞者今因録赤白吉了亦請附焉宋記曰文帝元嘉中湘州獻赤鸚鵡臧榮緒晋書曰義熈中林邑獻白鸚鵡也緋猨公路咸通十年往髙涼程次青山鎮鎮府設以備他盜也其山多猨有黄緋者緋者絶大毛彩殷鮮真謂竒獸夫猨則狙玃猨五百嵗為玃抱朴子曰猴夀八百嵗繁露曰猨似猴大而黑長前臂猨所以夀者好引其氣也猱猴也狖似猨之類其色多傅青白𤣥黄而巳小說云吾彦為交州時林邑王范能獻青白猨各一口山海經云堂庭山多白猨今三峽有白額猨按樓炭經云鳥有四千五百種獸有二千四百種白虎通云羽虫三百六十有六鳯為之長毛虫三百六十有六麟為之長今則豈可窮其族類歟其猨能伏鼠論衡曰鹿之角足以觸犬猶猴之手足以搏鼠然而鹿制於犬猴伏於䑕亦如淮南子云蝟使虎申蛇令豹止物各有所制也多羣行𤣥者善啼雌黄而雄黑也啼數聲則衆猨呌嘯騰擲如相去呼焉其音凄入肝脾韻含宫徴方知當去呼一部皷吹豈獨於鼃聲者哉愚因召獵者捕而養之目為巴兒極馴不貪食於樹杪間呼之則至但臂長身不便於行而未見通膊者也後一嵗自潘州廻路歴仙虚潘茂真人燒丹之處南人呼市為虚今三日一虛按神農氏日中為市致天下之民聚天下之貨交易而退各得其所蓋取之噬嗑易下係噬嗑合也市人之所聚異方之合耳聞舊山猨啼不食而卒噫其為獸之性一何仁耶是知鄧艾感事投弓故無虚語且梁朝猨卒責食吏違四日方送鹿心柿四貫及責𤣥圃養猨吏云殘林猶獲子堪杖四十復引雞冡鵝魂狗蓋馬帷之事瘞之又陸機快犬黄耳能解人言常傳書自洛至吳纔半月而返及死機為製棺槨殯之村人號為黄耳冡愚遂斆其事藉之以薪藏之以坎蚺虵牙蚺虵大者長十餘丈圍可七八尺多在樹上候麞鹿過者吸而吞之至鹿消即纒束大樹出其頭角乃不復動夷人伺之方以竹籖籖殺之取其膽也亦如巴虵食象三嵗而出其骨金樓子云楚詞云虵有吞象厥大如何故南裔異物志曰蚺惟大虵旣洪且長采色駿犖其文錦章食灰吞鹿腴成養創賔享嘉食是豆是觴言其養創之時肪腴甚肥美搏之以婦人衣投之則蟠而不起證俗音云蚺虵肉食之辟蠱毒元和御覽引括地志云蚺虵牙長六七寸土人尤重之云辟不祥利逺行賣一枚直牛數頭愚按古方刮虎牙治犬咬瘡神效無比未聞虵牙有利於人者抱朴子云蔡誕入山還家云被謫到崑崙崑崙下白虎蜲虵長百餘里口中牙皆三百斛船大一何壯哉比廣州南海縣每年端午日常取其膽供進虵則諸郡採送録事叅親㸔岀之按晉中興書曰顔含㛐病困須蚺虵膽不能得含憂歎累日有一童子持青囊授含乃虵膽也童子化為青鳥飛去以此驗之真膽不可得也近勅令桂賀泉廣四州輪次進焉其膏俗傳不利人其皮可鞔皷今潮州和鱗為之聲絶鳴與象皮皷相類蕃船上多以象皮鞔皷皷長而頭尖狀如棗核謂之㯽榔皷廣志云象性乆别見其子皮必泣一枚重千斤南越志云開寧縣多蜈蚣大者皮可以鞔皷沈瑩異物志云東南海中蜈蚣長數丈噉牛俚人秋冬間遇之鳴皷與春堂驅逐紅虵公路至雷州對岸倚舟候風勢見羣小兒簇二巨虵各長丈餘一如孔雀珠毛色金翠奪目一如真紅色鮮明若血又有十餘頭白虵前後相次若導從俱入一榕藤竅内竟不復岀故知虵有草朩水土四種其類不可窮也又歸化縣有兩頭虵南越志云無毒夷人餌之兼名苑云兩頭虵一名越王約髮俗占見之不祥然論衡引楚相孫叔敖二祐者何也㑹最又云渾夕之山囂水岀焉有虵一首兩身名曰肥遺見則大旱管子曰涸水之精名曰蟡音威一頭兩身以其名呼之可使取魚鼈長八尺虵也愚又憶近事韋中令臯鎮西蜀時有黄柑一樹方熟忽數夕衆實皆落唯樹杪一蔕獨存其大如椀枝葉滋茂異於常者園吏具白韋令韋令親視之曰此竒果也非臣下宜食議欲表進令去蔕尺餘折之其實從蔕自落有善毉者昝殷侍立曰凡朩實未過時蔕脫者乃實之病也請針驗之韋令再三方許昝殷引針就蔕刺之其實應手而轉殷則連下一刺血濺盈袖韋令大驚因命破之乃兩頭虵也異苑又云河内馬司元𦙍元嘉中為新塗令䘮官月旦祭柑化而為鵝又何怪也蛤蚧蛤蚧首如蟾蜍背淺緑色上有土黄斑㸃若古錦文長尺餘尾絶短其族則守宫博物志云蝘蜓以器養之食以朱砂體盡赤滿七斤搗萬杵以㸃女人支體終身不滅淫則㸃落故號守宫漢武為之有驗也刺蜴搜神記謂之刺蜴蝘蜓證俗音云山東謂之音七賜名敵反陕以西謂之壁宫字見韻集又說文曰在壁曰蝘蜓在草曰蜥蜴古今注一曰龍子善於樹中捕蟬食之五色曰蜥蜴短大者為蠑螈一曰蛇師大者長三尺其色𤣥紺善魅人鄭䖍又云蠑螈蜥蜴蝘蜓守宫别四名又蠑螈蛇醫也多居古朩竅間自呼其名聲絶大或云一年一聲驗之非也端州大㕔蛤蚧州吏云有來多年至今毎鳴或三聲或一聲不定也又有十二時蟲亦其類也大者一尺尾長於身背生鬐鬛行疾如箭傳云自旦至暮變十二般色傷人必死愚嘗獲一枚閉於籠中翫之止見變黄褐赤黑四色一云其首隨時輙作十二屬形乃言之過也紅蟹殻儋州岀紅蟹顔之推云說文或作䲒即蝤蛑擁劒證俗音蝤蛑大蟹也音由俾莫侯反又古今注云云擁劒一名執大螯赤顔氏家訓云擁劒狀如蟹但一螯大耳異物志俗謂之越王鈴下何遜詩云躍魚如擁劒是不分魚蟹也蟚蜞證俗音有毛者曰蟚蜞無毛者為蟚螖堪食俗呼彭越訛耳世說云蔡司徒誤食蟚蜞吐下謝仁祖曰卿讀爾雅不熟幾為勸學死螖音滑倚望臨海異物志倚望常起顧聣西東其狀如蟚螖大行塗土四五進輙舉兩螯八足起望行如此青色也招潮修文殿御覧招潮小蟚螖殻白依潮潮長皆坎外舉螯不失常期俗言招潮子也竭朴臨海異物志曰竭朴大如蟚螖殻黑斑有文章常以大螯障目屈其小螯取食也沙狗臨海異物志沙狗似蟚螖壊沙為穴見人則走易處不可得也蘆虎臨海水土異物志曰蘆虎似蟚螖兩螯正赤不甲食也數丸名苑曰沙丸形似蟚蜞競取土各作丸滿三百而潮至大小殻上多作十二㸃深燕支色亦如鯉之三十六鱗耳陳思王云五尺之鯉一寸之鯉但大小殊而鱗之數等其殻與虎蠏堪作疊子虎蟹赤黄色文如虎首斑至於鸚巵螺杯不同年而語也鸚巵今多之名見吳均集鸏鵰兩鳥也喙大而匈一尺黄赤色受二升堪為酒杯南越志曰一名越王烏竺法真登羅山䟽曰鳥状似鵝口勾可受二升南人以為酒杯珍於文蝶鳥不餌虫魚惟噉朩葉糞似薰陸香按蟹一名蛫音詭廣雅云雄曰䱺雌曰博帶抱朴子又云山中辰日稱無腸公子蠏也古今注云小蠏一名長卿廣志云鋪音脯小蠏大如貨錢又蠏奴如榆莢在其腹中生死不相離博物志曰南海有水虫名曰葪蚌蛤之類也其中小蟹大如榆莢葪開甲食則蟹亦岀食葪合蟹亦還入始終生死不相離也山海經載千里蟹金樓子云天下之大物有北海之蠏洞冥記有貢百足蟹長九尺四螯者今恩州又岀石蟹其類則零陵鷰湘鄉魚建寧蝦綿谷鼈也零陵石燕遇雨則飛又庾穆之湘州記云湘鄉縣有石魚山色黑而理若魚開發一重輙有魚形鱗鬐首尾若刻畫燒之作魚膏臭亦如水經云鄖鄉縣西石山蝦䗫南越志建寧縣出石蝦也又年代録云石季龍時利州綿谷縣山北溪中有石鼈數千頭登岸暴田苖發軍殘毁至今鼈無頭也蛺蝶枝公路南行歴懸藤峽峽即富州界也維舟飯水手覩嵓側有一朩五綵初謂丹青之樹武陵記辰州嵩溪有丹青樹直上可籠雲下無枝條上有五色葉圖如華蓋玉屑云按在辰陽縣也因命童僕採之頃獲一枝尚綴嫩蝶凡二十餘箇有翠紺縷者金眼丁香眼者紫斑眼黑花者黄白者緋脉者大如蝙蝠者小如榆莢者沈佺期賦云二角六足蠕腹狀蛾脉紺縷以立翅㸃赬珠以緗窠也愚因登岸視之乃朩葉化焉是知蝶生江南甘橘樹中古今注蛺蝶一名野蛾江東人謂之撻末其大黑邑或青斑者名鳯子一名鳯車一名鬼車是也麥為􅺄蝶烏足之葉為蝴蝶皆造化使然豈虚語歟公路嘗見盧員外肇說捉得一粉蝶如兩手大上有散緑㸃丁香眼前翅頭兩畫燕支色後翅為燕尾分亦蝶之異也又㑹要云大食國西隣大海嘗遣人乘船經八年未極西岸中有一方石石上有樹榦赤葉青樹生小兒長六七寸見人皆笑動其手脚凥著樹枝其使摘取一枝小兒死也異苑太元中汝南人入山伐竹見一竹中央虵形巳成上枝葉如故吳郡桐廬民嘗伐竹遺竹一宿見雉頭頸盡就身猶未此亦竹為虵虵為雉也紅蝙蝠紅蝙蝠岀瀧州背深紅色唯翼脉淺黑多雙伏紅蕉花間採者若獲其一則一不去南人收為媚藥與象鼻虫鱟珠諾龍為比象虫有鼻長二寸許而紅其前翼麴塵色副翼為斑紅色多在龍眼樹上鱟魚珠廣州記云鱟形如熨㪷郭璞云形如惠文冠青黒十三足雌常負雄取之必得其雙子如麻子堪為醤即鱟子醬也其珠如粟黄南人或帶或磨飲之云利市生於橄㰖樹上自呼其名聲響巖谷諾龍純雄無雌岀瀧州水族至其前者即跳躍自置諾龍取而食之房千里投荒錄亦具記王子年拾遺云有五色蝙蝠異物志鼉蝨魚因風雨入空朩而化為蝙蝠其肉甚美靈芝圖說曰蝙蝠古今注一曰仙䑕五百嵗則色白腦重集物則頭垂故謂倒挂蝙蝠食之神仙水經云夷道縣丹水遥亭下有石穴穴中有蝙蝠大者如鳥倒挂與𤣥中記說略同服之夀萬嵗又媚藥載嗽金鳥辟寒金三國時昆明國貢魏嗽金鳥鳥形如雀色黄常翺翔海上吹金屑如粟鑄以成器服宫人争以鳥所吐金為釵佩謂之辟寒金以烏畏寒也又宫人相嘲哢不服辟寒金那得帝王心龍子事具蛤蚧布榖脚脛骨媚藥也男左女右帶之置水中能相隨逐爾雅云鳲鳩今人云布榖牝牡飛鳴以翼相繫云鳴鳩拂其羽鵲腦淮南萬畢術曰鵲腦令人相思砂䅗一名茍子能倒行置枕中令夫妻相好事見陳藏器本草䔄草姑媱山帝女死焉其名曰女尸化䔄草其葉胥成言葉相重音亦遥反華黄服之媚於人一名荒夫草即此是也茍草青要之山有草狀如葌菅似茅也方莖黄華赤實其本如藁本名曰茍草或作苞服之美人色令人更美艷也左行草使人無情范陽常進大業記錯綵葼花似左行草花葉纎長而多色正赤甚美香也獨未見録紅蝙蝠處豈闕載乎又有無風獨摇草亦生嶺中男女帶之相媚頭若彈子尾若鳥毛兩葉開合見人自動故曰獨摇草本草拾遺具也又陳藏器云榼子蔓生取子中人多食之主蠱毒帶於衣令人有媚多迷人子如土瓜無毛秋熟色赤形如酒榼也金龜子金龜子甲虫也五六月生於草蔓上大於榆莢細視之真帖金龜子行則成雙類壁龜耳事見洞冥記其虫死則金色隨滅如螢光也南人收以養粉云與永粉相宜按竺法真登羅山䟽曰金光蟲大如斑苖形色文采全是龜余偶得之養玩彌日疑此是也又南雍州記曰石橋水經南陽結為池岀靈龜色如金縷也玉屑亦具論衡又云龜三百嵗大如錢蓍七十嵗生一莖此神物故生遲也乳穴魚全義之西南有山曰盤龍山有乳洞斜貫一溪號曰靈水洞記曰山曰靈山水曰靈水幽而有靈是以名也且地志山經所不載又云魚無大小修尾四足朱丹其腹㳺泳自若漁人不敢釣之昔有人窮其源至數日者􅊻炬多為白蝙蝠所撲中若風雨聲習習然皆毛戰不敢進蓋神仙之窟宅豈腥膻者擬容易造乎夫天下名洞三十有六而洞庭林屋當其九也按洞庭林屋即吳王使龍威丈人得禹書之處禹書一曰靈寳經三卷亦曰靈寳符吳王齋戒受之不觧其詞乃遣使賫此以問孔子孔子不發其函而言昔聞有童謡曰吳王出遊觀五湖龍威丈人名隠居比上包山入唐墟乃造洞穴竊禹書天帝大文不可舒分强取之令國虚又華陽洞是林屋洞之右門也其小者不可勝言得非名在九微志中世俗所未聞耶其洞有金沙龍盆魚皆四足修尾丹腹狀若守宫㳺泳水濵人莫敢犯按御覽云盤龍山天寳六年改為龍蟠山山有石洞洞中有石床石盆人毎秉燭遊者嘗見龍跡洞中小水水有四足魚皆如龍形人殺之即風雨也然唐韻云魚名四足山海經云人魚如䱱音啼魚四脚岀丹洛二水有鯢大者謂之音啼爾雅注鯢似鮎四足聲似小兒但未見言其可致風雨耳公路因思道書說五頭魚張天師二十四治具之三足麂翔法師云四明山有白麂三頭三足即葛仙公桐杋所化皆神化所致不可以類而稱也若以魚之異者則醴水之魚名朱鼈六足有珠吕氏春秋其江賦云頳鼈肺躍而吐璣是也又歴澗潭有五色魚俗以為靈而莫敢捕因謂是水為龍魚水水合汧水又丹水岀丹魚先夏至十日夜伺之丹魚必浮水側赤光上照赫然如火網而取之割血以塗足下則可步履水上岀丹水縣抱朴子其南越志云有魚名䗶色黄味美夜即有光一如照燭又翔法師云鮆音薺魚一首十身氣如蘪蕪山海經何羅魚一首十身音如犬吠食之巳癰也初學記引魚鯉背上有斑文腹下有純青海水將潮及天將雨毛皆起潮還天晴毛則伏常千里外可知海潮亦如博物志云牛魚也又金魚腦中有麩金狀如竹頭魚岀邛婆塞江一名江魚常食麩金又吳王江行食鱠有餘弃江中為魚今江中有魚名吳王餘鱠者長數寸大如簪是也又魏武四時食制曰望魚側如刀可以刈草岀豫章白髮魚戴髮形如婦人白肥無鱗岀滇池又郭延生述征記曰城陽縣城南六里堯母慶都墓廟前一池魚頭間有印文謂之印頰魚非告祠者捕不得臨海志又曰印魚鱗額上四方如印有文章諸大魚應死者印魚先封之又臨海異物志䱼魚如指長七八寸但有脊骨好作羮滑美似餅大者如竹曝作燭極有光明又比目魚一名鰈音搨一名鰜音兼狀似牛脾細鱗紫黑色一眼兩片相合乃行沈懐逺南越志謂之板魚亦曰左介介亦作魪唐韻魪比目魚也吳都賦云雙則比目片則王餘陳仲弓異聞記東城池有王餘魚池決魚不得去將死或以鏡照之魚看影謂其有雙於是比目而去異物志南方鏡魚圓如鏡也又異苑云䱤音陷魚凡諸魚欲産䱤魚輙以頭衝其腹世謂衆魚之生母又臨海水土異物志鹿魚頭上有兩角如鹿又云鯪閭蒸反魚背腹皆有刺如三角蔆又神異經云黄公魚長七八尺狀如鱧魚晝在石湖中各化為人刺之不入煮之不死以烏梅二七煮之即熟食之治邪病若此之類豈勝言哉魚種南海諸郡郡人至八九月於池塘間採魚子著草上者懸於竈烟上魚八九月多於水韭上放子水西菜上放子水西菜即水草也土人呼之未詳至二月春雷發時却收草浸於池塘間旬日内如蝦䗫子狀悉成細魚其大如髮土人乃編織藤竹籠子塗以餘粮或遍泥蠣灰禹餘粮也蠣灰即異物志古賁灰牡蠣殻又南越志蠣蠔甲也收水以貯魚兒鬻於市者號為魚種魚即魿鯽鱧鯉之屬魿魚其鱗如銀肉白如雪脆而且甜偏宜作鱠北中無也故異物志曰南方魚多不肥美唯魿魚為上作鱠無比作炙尤香美又楚詞注曰鰿魚說文作􅠧永嘉訛作鯽證俗音曰吳人呼為鯽魚也於池塘間一年内可供口腹也愚按陶朱公養魚經曰朱公謂威王治生之法有五水畜第一水畜魚池也以六畆地為池池中有九洲求懐姙鯉魚長三尺者任二十頭牡魚四頭以二月上庚日内池中令水無聲魚必生至四月内一神守六月内二神守八月内三神守神守者鼈也魚滿三百六十則蛟龍為之長而將魚化飛去内鼈則魚不復去池中周遶九洲無窮自謂江湖也至來年二月得鯉魚長一尺者一萬五千枚三尺者二十四枚至明年得長一尺者十萬枚長二尺者五萬枚長四尺者二十四枚留長二尺者二千枚作種所養理不相長也又欲令生魚法要須載取藪澤陂湖饒大魚之處近水際土寸餘載以布池底三年之中即有大魚此由土中先有大魚子得水生也又南史云始興盧度字孝章有道術隠居屋前池養魚皆名呼之次第來取食乃去也又拂菻國有羊羔生於土中其國人候其欲萌乃築墻以院之防外獸所食然其臍與地連割之則死唯人著甲走馬擊皷駭之其羔驚鳴而臍絶便逐水草煬帝欲通之竟不能致貞觀十七年其王波多力遣使獻赤頗黎金精等物又博物志云取鼈剉如棋博赤莧汁和令厚以茅苞之六月中投於池澤中經旬臠臠成鼈也水母水母兼名苑云一名蚱一名石鏡南人治而食之云性熱偏療河魚疾也其法先以草朩灰退去外肉中有一物或紫或白合油水再三洗之雜以山薑荳䓻煮過其瑩徹不可名狀至於真珠紫玉無以比方此物須以薑醋食之蓋相宜也按博物志云東海有物狀如凝血縱廣數尺無正員名曰蚱亦無頭目腸藏衆蝦隨之越人食之稽聖賦云水母東海謂之䖳音蜡正白䝉䝉如沫生物皆别無眼耳故不知避人常有蝦依隨之蝦見人驚此物亦隨之而驚以蝦為目自衞也亦如視肉有眼以物摘之則其眼移處山海經曰視肉聚肉也形如牛肝有兩耳食之盡尋復生也北户録卷一
