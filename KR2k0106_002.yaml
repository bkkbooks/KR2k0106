body:
  text: 北户錄卷二唐段公路撰龜圖註蚊母扇端新州有鳥類青鷁而觜大常在池塘間捕魚而食每作一聲則有蚊子羣岀其口今謂之吐蚊鳥按爾雅注鷏鳥似烏􅖂而大黄白雜文鳴如鴿聲廣志云蚊母此鳥吐岀蚊也土人云其翅堪為扇唯辟蚊子與陳藏器說同又云塞北有䖟母草嶺南有䖟母朩此三色異類而同功南越志又云古度樹一呼郍子南人號曰㭦日亞反不華而實實從朩皮中岀如綴珠璫其實大如櫻桃黄即可食過則實中化為飛蛾穿子飛岀愚驗之亦有為蚊子者鵝毛被邕之南有酋豪多熟鵝毛為被毛取項上及腹下嫩毛蒸治之如稻畦衲之其温軟不下綿絮也一云甚宜小兒愚記陳藏器云鵝毛主小兒驚癎者蓋為此也按上古十紀有合雒紀教人穴處自食鳥獸衣其皮毛豈逺夷尚敦古之遺風耶愚憶㑹要載女國毛裠都播國緝鳥羽以為服洞冥記云董謁聚鳥獸毛寝家訓云朱詹飢即吞紙寒即抱犬讀書亦事較著者也紅蝦盃紅蝦岀潮州番州南巴縣大者長二尺土人多理為盃或釦以白金轉相餉遺乃玩用中一物也王子年拾遺云大蝦長一尺鬚可為簪洞冥記載蝦鬚杖馬丹常折丹蝦鬚為杖後弃杖為丹石於海傍也王隠晋書云吳復置廣州以南陽滕循為刺史或語循蝦鬚長一丈循不信其人後故至東海取鬚長四丈四尺杖以示循方乃服也然兼名苑云廣州獻蝦頭杯簡文將盛酒無故自躍乃不復用愚又按毛詩義䟽貝大者有一尺六七寸今九真交阯以為杯盤實竒物也六韜商王拘周西伯於羑里太公與散宜生金千鎰求珍物以免君罪九江之浦有大貝百慿詩作朋也廣志云海文蠡有大者受一㪷南人以為酒杯又搜神記謝端侯官人少孤為鄉人所養年十八恭謹自守後於地下得一大螺如三㪷盆將置瓮中早至野還見有飲飯湯火處端疑之於籬外窺見一少女從瓮中岀至竈下燃火便入問之女答曰我天漢中白螺素女天帝哀卿少孤使我來相為守舍炊煑使卿後得婦當還今無故相伺不宜復留今留此殻貯米可得不乏忽有風雷而去也又異物志蒼鷹螺江東人以為椀也雞毛筆畨禺諸郡如隴右多以青羊毫為筆昭州擇雞毛為筆其三覆鋒亦有圓如錐方如鑿可抄冩細字者昔溪源有鴨毛筆以山雞毛雀雉毛間之五色可愛徴其事得非入江淹夢中者乎且筆有豐狐之毫傅子云漢末筆非文犀之楨必象遺之筦豐狐之毫秋兔之翰虎僕之毛博物志有獸縁朩似豹名為虎僕毛可為筆也䖮蛉䑕毛廣志云可以為筆䑕鬚均州岀羖䍽羊毛邛朔取腋下族毛麝毛貍毛鄭公䖍云麝毛筆一管冩書直行四十張狸毛筆一管界行冩書八百張馬毛嘉州羊鬚陶隠居燒丹封鼎際用羊鬚筆胎髮吴嫗多以小兒髮為柱筆鄭䖍云蕭祭酒常用之又韋仲將筆方云筆柱或云墨池亦曰承墨又有枊筆皮筆鐡筆也龍筋金陵拾遺具為之然未若兎毫其宣城嵗貢青毫六兩紫毫三兩次毫六兩勁徤無以過也今嶺中亦有兔但纔大於䑕比北中者其毫軟弱不充筆用是知王羲之歎江東下濕兎毫不及中山又煬帝取滄州兎養於揚州海陵縣至令勁快不堪全用蓋兎食竹葉故耳然次有鹿毛筆普張華嘗用之不下兎毫按博物志云筆䝉恬所製世有短書名為黄仲舒答牛亨問曰䝉恬作秦筆枯木為管鹿毛為柱羊毛為被所謂蒼毫非兎毫也夫有筆之理與書同生具尚書中候云龜負圖周公援筆冩之其來尚矣雞卵卜邕州之南有善行禁者取雞卵墨畫祝而煑之剖為二片以驗其黄然後決嫌疑定禍福言如響答據此乃古法也神仙傳曰人有病就茅君請福煑雞子十枚以内帳中須㬰茅君悉擲岀中無黄者病多愈有黄者不愈常以此為候風土記曰越俗性率朴淳而未散至於有疾不卜問祈請言天生天殺歸自然及其意親和合即脫頭上巾幘觧腰間五赤刀以厚結之為交拜親跪妻定交有札俗皆當於山間大樹下封土壇祭以白犬一丹雞一雞子三名曰朩下墅雞犬在其壇地民人畏之不敢犯祝曰天地父母某月某日甲與乙為友善上下四旁莫不並見卿乘車我戴笠他日相逢下車揖我步行卿乘馬後日相逢卿當下如此者數千百言盖南人重雞卵也愚又見卜之流雜書傳虎卜紫姑卜牛蹄卜灼骨卜鳥卜雖不法於蓍龜亦有可以稱者按博物志曰虎如衝破又能畫地卜今人有畫物上者推其竒偶謂之虎卜異苑曰世有紫女一書紫姑古來相傳云是人妾為大婦所嫉每以穢事相役正月十五日感激而死故世以其日作其形夜於厠門間或猪闌邉迎之呪曰子胥不在是其壻名曹夫人亦歸去即其大婦也小姑可岀戯捉者覺重便是神來奠設酒果亦覺面貌輝輝有色即跳躁不住能占衆事卜行來蠶桑又善射鈎好則大舞惡便仰眼又魏畧曰髙句驪有軍事祭天殺牛觀蹄以占吉㐫蹄解者㐫合者吉夫餘國亦爾又云倭國大事輙灼骨以卜先令如中州令龜視坼占吉㐫也又㑹要曰東女國以十一月為正每至十月令巫者賫酒饌詣山中散麥於空中大咒呼鳥俄有鳥如雉飛入巫者懐中因割其腹有一榖來嵗必登若霜雪必多異災其俗因之名為鳥卜武徳中其女王遣使貢方物也公路又按子路見孔子曰猪肩牛膊可以得兆何必蓍龜孔子曰取其名也夫蓍者耆也龜者舊也狐疑之事當時問耆舊也又有螺叚卜遺鷄骨卜南方逐除夜及將發船皆殺鷄擇骨為卜傳古法也漢書郊祀志云越祠鷄卜如䑕也今南人慿之頗有神驗每取雄鷄一隻以香米祝之後即生折其腿削去皮肉或烹取之卜男左卜女右看之其骨有二竅或七八竅左為人右為鬼取隂陽之理也乃以竹簪刺於竅中而究其兆如人在上鬼在下為吉人在下鬼在上為㐫如人鬼頭相背事遲緩相就事疾速卜吉即以肉祠船神呼為孟公孟姥其來尚矣按梁簡文船神記云船神名馮耳五行書云下船三拜三呼其名除百忌又呼為孟公孟姥劉思貞云𤣥冥為水官死為水神冥孟聲相似又孟公父名幘母名衣孟姥父名板母名履或云冥公冥姥因𤣥冥也異苑曰船神曰孟公孟姥利渉之所䖍奉商賈之所崇仰也荆州送迎恒烹牛為祭桓宣武始鎮陜西不依舊法發至冽州平乘中江而漂梢柂莫制咒請立止公路咸通辛夘年從茂名歸南海陸盡東口行次水程舟人具牢醴以祭船神請愚為祝詞曰嵗在單閼時及朱明栁絮風老桃華水平倚蘭檝兮淺岸張布帆兮長汀粤有舟子請禱𤣥冥孟家遂即建髙檣開左郭列䍧牱呼著作召靈胥邀海若對蛟浦而烹牢當鹿牀而命爵於是具六味羅八珍羽毛咸備蘇膏必陳剖螝陸兮合雜刳博帶兮繽紛螃玉色魚錦文噎鳩餅脆騎驢酒新無非可口兼乃著人果則獨根橄欖焦核荔枝三節􅦠細腰蹙咨署預蠡薺素藕烏椑委盤纂纂堆案離離更有越方之儔解悟之軰或衣朱裳或塗翠黛奏曲搊絃燃膠爇蕙初叙訶而廽瞻遂傳詞而連啑詞云神下降兮龍驤巫歡喜兮䑕態駕雷電兮熒煌擁烟雲兮靉靆又曰船容裔兮何在櫓去穩兮徘徊絶駕波兮此去隨駚潮兮朅來象鼻炙廣之屬城循州雷州皆産黑象牙小而紅堪為笏裁亦不下舶上來者陶貞白云凡夏月治藥亦宜以象牙置邉土人捕之争食其鼻云肥脆偏堪為炙滋味小類猪之含消今之炙也亦不知一割牛心猩猩脣之美也愚按䲋子林反魚兩味犀有五肉象有十二肉其膽隨月轉耳陳藏器云唯鼻是其本肉諸即雜肉凡象白者西天有之五真臘有戰象五千頭㑹要云又供御陁國有青象皆中夏無也梁翔法師云象一名伽郍古訓云象孕子五嵗始生山海經云性妬不畜淫子西域記云有一僧行遇羣象上樹避之象隨倒樹負之至林中有一病象足瘡而卧引沙門手至所苦處乃竹刺沙門為㧞去之裂裳與裹俄頃一象持金函授病象病象轉授沙門發視之乃佛牙也又萬嵗厯曰成帝咸康六年臨邑獻象一知跪拜博物志曰日南四象各有雌雄其一雌死百有餘日其雄泥土著身獨不飲酒食肉長吏問輒流涕有哀狀鵞毛脡恩州出鵞毛脡乃塩蔵鱊音聿魚其味絶美其細如蝦雖郭義恭云小魚一斤千頭未之過也魚大如針蜀人以為醬也又有嘉魚出邕江石穴中魚下至梧州戎城縣水口絶肥美亦堪為脡左太冲蜀都賦云嘉魚出于丙穴注云丙穴在漢中沔陽縣北有魚穴二所常以三月八日取之丙地名也魚鱗細似鱒魚博物志説同或云魚以丙日出穴故陳蔵器云嘉魚乳穴中小魚能久食力強於乳丙者向陽穴多生此魚魚復何能擇丙日出入耶議者以陳言為是酈善長云穴口向丙又引栢枝山山有丙穴穴方數丈水有嘉魚常以春末㳺渚秋入穴故知丙穴之魚不獨褒漢中有也愚按水中之穴者謂之逹據山海經云半石之山合水出其陽多鰧魚其狀如鱖居達達水中之穴相交通者鰧音騰桄榔炙桄榔莖葉與波斯棗古散古散堪為拄杖椰子㯽榔小異其朩如莎樹皮穰木皮出麵可食廣志云莎樹出麵華陽國志云郡少榖取桄榔麵以牛酪食之吳錄地志云交趾望縣有穰朩皮中有如白米屑者乾搗之水淋似麵可作餅臨海志桄榔朩作鋘鋌利如鐵中石益利唯中蕉根致敗物之相伏如此皮中有如米粉中作餅餌會最又云都句樹似栟櫚朩中出屑如麵可啖出交州洛陽伽藍記云昭儀寺有酒樹麵木得非桄榔乎南史云扶南國有酒樹似安石榴採其花汁停著瓮中數日成酒醉人也木理有文堪為握槊局兼名苑云其戯阿育王弟善客造梁天監中始來中土然雙六賦云諸葛恪開館延賓分曹並戯此則吳時已有賦内警句云若乃位占列星城分偃月或七縱而七擒或百犯而百伐又崔令欽六博云握槊胡戯後魏等術藝傳云胡王有弟一人遇罪將殺之弟從獄中為此戯以上之意言孤則易死其後遂入中國世宗以後大盛於時有趙國李幼序洛陽丘阿奴皆善之梁武謂之婆羅塞戯胡謂六為堰數二為鷕鷕今言握槊么么皆轉聲也或妄云曹子建為盖以俱是魏同得罪於是事迹相似因此疑誤其心似藤心為炙滋腴極美其鬚可為帚香潤絶勝㯶柟山海經云一名栟櫚也書云縛唱國納縛伽藍唐言新也有佛帚迦奢草作也郭義恭又云醜尉叟可為帚陶勝力集記説鳥帚一名豐賢當紅鹽恩州有塩場出紅塩色如絳雪驗之即由煎時染成差可愛也公路記鄭公䖍云琴湖池桃花塩色如桃花隨月盈縮在張掖西北隋開皇中常進焉一云十五日以前塩甘月半以後苦也按塩有赤塩紫塩黑塩青塩黄塩書抄云沈約宋書曰虜至彭城與張暢語送白氊赤塩又郭璞塩池賦曰爛然漢明晃爾霞赤是也又虞世苖書云蔡邕從朔方報羊月書云幸得無恙遂至徙所自城以西唯有紫塩也續漢書云天竺出黑塩又北堂抄引博物志云北胡青塩但以味色浮雜為不同耳黄塩安西城北澗中有色如蕪菁華者鄭公亦述成之自然國之寳也夫塩本草云牢肌骨去毒虫明目益氣戎塩即萬畢術累卵是也亦有如虎周官如印博物志具又通典云九原嵗貢印成塩五原貢塩山四十顆又水經云龍城池廣千里皆為塩而剛𦂳有大塩方如巨枕者又南史云大同中外國有獻鳴塩枕者如繖荆楚記具如石如水精狀者南史月支恒水下有真塩色正白如水精或朝取暮生又非煑海所致者也米䴵廣州南尚米䴵合生熟粉為之規白可愛薄而復肕亦食品中珍物也按梁劉孝威謝官賜交州米䴵四百屈詳其言屈豈今之數乎且前朝短書雜説即有呼食為頭梁元帝謝賜功徳浄饌一頭云瑶器自滿金鼎流味漿含都蔗味資石蜜又謝賚功徳食一頭云天厨浄饌菴羅法菓又劉孝威謝賜聖僧餘福果食一頭云五杏七桃靈𤓰仙棗以魚為㪷梁科律生魚若干㪷茗為薄為夾溫貢茗二百大薄又梁科律薄若干夾云云筆為雙為床為枚搜神記云益州西有神祠自稱黄石公祈禱者持一百紙一雙筆一丸墨先聞石室中有聲便具吉凶不見形也南朝呼筆四管為一床梁簡文帝答徐摛書云時設書幔乍置筆床梁令云寫書筆一枚一萬字墨為螺為量為丸為枚陸雲與兄書今送墨二螺婦人集汲太子妻李與夫書云致尚書墨十螺梁科律御墨一量十二丸皇后妃一量一百丸蔡質漢官儀曰尚書令僕丞郎月賜隃麋大墨一枚小墨一枚宋元嘉中格寫書墨一丸限二十萬字紙為畨為幅為闕湘東啟上荆武紙萬幅筆四百枚簡文帝集繹啟謹奉紅牋二千畨陸倕有謝安成王賜西牋紙一萬幅梁簡文帝又云特送四色筆三萬枚湘東王會最云晉宋間有一種紙或一幅長丈餘言就舡中抄之世謂蠒紙又云張載紙銘晉載紙為畨紙字從系蔡倫作紙從巾布為鼓梁祖布五文度曰取薄布二十疋為一鼓錦為兩王佐云幣錦二兩為一兩一兩一疋二丈為端也左傳云歸夫人重錦三十兩注錦以二丈雙行故曰兩三十疋是也衣為裁陸倕謝安成王楚越衣二裁沈約有謝葛衫二裁也袈裟為縁梁文帝云䝉賚欝金泥細衲袈裟一緣忍辱之鎧安施九種功徳之衣慙愧八法奴為頭簡文帝書言安吉王餉胡子一頭云方言異俗極有可觀山髙海深宛在其貌梁科律文云奴一頭婢一頭麝為子蠟為䴵麝香如干子蠟如干餅齊建武四年事檳榔為口胡桃為子為口陸倕謝安成王賜檳榔一千口又謝胡桃一千子又沈約謝賜臣交州檳榔千口云龍編嘉實厥包遐逺其事不可備論今髙州多採藷為麻䴵絶宜人味極芳美方言云人謂署預為儲是也又都播國土多百合亦有取根以為粮者事具㑹要本草云署預一名山芋山海經云景山名藷藇江南單呼為藷語有輕重也其法採藷去外皮磨之曝乾為粉臨用時别取藷磨取濕者溲之他如麵法瓊州溲為湯䴵顔之推又云􅝀茨今去墨皮以為粉作湯䴵甚光滑食目韶州菜有蕪菁郡人採之為葅脆而且甘不失北中味也方言蘴蕘蕪菁也陳楚之郊謂之蘴齊魯之郊謂注之蕘關之西謂之蕪菁趙魏之間謂之大芥郭璞薑音蜂江東音菘又云紫華者謂之蘆菔證俗音曰葖蘆菔蕪菁屬紫花又根俗呼為雹也愚按顧啟期婁地記曰薛山者昔有薛伯道居此山不知何時人好稼植緣海散蕪菁子今海邊尚有此菜云伯道所種又按司馬相如凡將篇謂為菛菁當門證俗音㝠小學篇曰芴闕菁㑹最又云以子江南種變為菘菘子黒蕪菁子紫赤也又據南朝食奠中有芥子醬蘆蔔根葅菘之類是江南為菘驗也證俗音云小學章作闕今畨禺唯韶州産蕪菁林檎朩𤓰廣志云一名里琴似赤柰齊民要術曰林檎堪為麨爾雅曰楙朩𤓰也賈思協云凡書厨中安麝香朩𤓰即無蠧勤州出栗子形味俱劣一年栗方熟羣鸚鵡至俱啄食而盡竇州出梨梨大如拳有類浙東成家梨可蒸而食乃皮厚肉硬又非哀家梨也縉雲成家出此梨因以為名世説云桓南郡𤣥每見人不快輒嗔曰君得哀家梨當復不蒸不食舊語秣陵有哀仲梨甚大如升入口便消言愚人不别味得好梨而蒸食也廣之人食品中有團油飯凡力足家有産婦三日足月及子孫脺為之飰以煎蝯魚炙鷄鵝煑猪羊鷄子羮餅灌膓蒸脯菜粉餈粔籹蕉子薑柱塩豉之屬裝而食之是也䘓說文云羊凝血也音口紺反今廣人生以五味酢食之按證俗音云南謂凝牛羊鹿血為䘓以虀噉之消酒也蟻子醬蚳醢也今山源間有蟻子於茅根下為窠者收卵為醬也老鹹虀採老菜以飰和塩藏之一如常法有入蕉心者其瓮埋於池塘間至三年菜色如金土人所重蛤臛理之常法蛤即蛙也周書腐草為蛙陶注本草青脊者曰土鴨黒者南人呼為蛤子南史卞彬為蝦蟇賦云紆青拖紫名為蛤魚以諷令僕漢書言鄠杜之間水多蛙魚人得不飢又朱書張暢弟為猘犬所傷醫云食蝦蟇鱠可愈而弟有難色暢先食而弟方食果能愈疾即知前古之人食蛙乆矣又衝波傳蝦蟇無腸龍蛇屬也抱朴子云萬嵗者頷下丹書八字南史丘傑列傳又云蝦蟇有毒夢中得三丸藥後服之下科斗子數升博物志所謂東南之食水産有蛙蛤螺蚌之為殊味不覺其腥臊今按蛙唯性熱甚補人人有折其足於瓶中以水養之不三五日其損如故亦有以蘇煎食者是也褒牛頭南人取嫩牛頭火上燂過證俗音炙去毛為燂以亷反復以湯毛去根再三洗了加酒豉葱薑煑之候熟切如手掌片大調以蘇膏椒橘之類都内於瓶瓮中以泥泥過煻火重燒其名曰褒愚曽於衡州食熊蹯大約滋味小異而不能及又按南朝食品中有奧肉法奧即褒類也先以宿猪肥者臘月殺之以火燒之令黄煖水梳洗削刮令浄刳去五臟猪肪煼取脂臠方五寸令皮肉相兼著水令淹没於釜中炒之肉熟水盡更以向所煼肪膏煑肉脂一升酒二升塩三升令脂没肉煖火煑半日許漉岀瓮中餘膏冩肉瓮中令相淹食時水煑令熟切調和如常肉法尤宜新其二嵗猪肉未堅爛壊不堪作又有泟腤煎肖法方言熬㷅煎㷶鞏火乾也㷅字崔寔四民月令作炒亦作煼字㷶字詁訓一力反古文􅻘字作㷶陷炙糟範炙毛泟魚白卄瀹肫法藥名煑也顔之推云瀹白煑肉爾雅注作灼合豐鷄合豐白肉密毛煎魚臨臉盧減反臨臉法用猪腸經沸湯岀三寸斷之決破細切熬之與水沸下豉汁研米葱薑椒胡芥蒜下塩酥筭子細切血將奠與之早與血則變也下淡奠有蟬臛乃古人爵鷃蜩范之類也薄夜餅用鷄臛曼頭餅齊民要術書上字束晢䴵賦此曼頭字雀喘餅用酢丸餅渾沌餅要術書上字廣雅曰餛飩也字苑作餫顔之推云今之餛飩形如偃月天下通食也夾餅安寒時肉夾員心羅脂煑糖蟹法周禮蟹螖音赦九月中取母蟹著水中勿令傷損及死一宿腹中浄乆則吐黄吐黄則不佳也先煑薄飴飴餳也着活蟹冷糖中一宿煑蓼湯和白塩極鹹待冷瓮盛半汁取糖中蟹内着塩蓼汁中便死蓼宜着少多則爛泥封二十日岀之舉蟹臍着薑末還復臍如初内着泔中百筃一器還以前塩蓼汁澆之令没密封勿令漏氣便成矣特忌風中則壊而不美蒸炙牛胘户堅反老牛胘厚而脆剗牢痛蹙令聚逼火急炙令上劈烈然後割之則脆美若挽令伸舒㣲火遥炙則薄而且朋經云跳丸炙如彈大炙煑之皮脯馬腸鹿尾尺炙筒炙銜炙法鹿角菜葅紫菜葅爛畔盧龍時經云云葛鑚說文云鑚今呼羹和飰為之水溲餅要術云立秋毋食煑餅及水溲餅餅唯酒引餅入水爛水溲得水輒消也又果奠合子有寒具證俗音􅢑􅞻内國呼為糫餅亦呼寒具鄭𤣥注周官有寒具未知是􅢑􅞻否力田反力走反百支䊦截餅黄萬柏散饊急就篇飴餳說文曰熬稻餦鍠也音散桑但反廣雅粰􅦴饊也證俗音云今江南呼饊飰巳煎米以糖餅之者為粰􅦴也音浮流白甘脆赤牒棗剥棗胡麻糖雀頭糖亷薑鬼目蜜㯽榔周成雜字曰㯽榔果也似螺可食益智甘蕉甘㰖根縁羊梅今瓊崖髙潘州以糖煑嫩大腹㯽榔辯州以蜜漬益智子食之亦甚美採字苑曰雜藏果也音素慼反顔之推云今以宻藏雜果為粽又有都念子花似紫蜀葵實如軟棗拾遺云甚甘美益人隋朝植於西苑中印度岀那核婆果大如冬𤓰熟則果赤剖之中有十小果大如鶴卵更又破之其汁黄赤其味甘美或在樹枝如衆果之結實或在樹根若茯苓之在土又波斯牟果葉長五六尺果堪食狀如人手樹髙丈五葉堪作食簟又頻郍婆果生樹後大如八石瓮味甚甘食之便醉九日而蘇見㑹最也愚又思束晢餅賦餢飳當音剖注燭顔之推云今内國餢飳以油蘇煑之江南謂蒸餅為餢飳未知何者合古腅國謂云主孟啗我字林曰腅肴也音大濫反之推又云今内國猶言餅腅及按方言江南有鹿䈥腅及臛之類又韓肉本法岀韓國為之如羮而少汁加醉也餪女字林曰饋女也音乃管反證俗音云今謂女嫁後三日餉食為餪女也睡菜睡菜五六月生於田塘中葉類茨菰根如藕梢其性冷土人採根為鹹葅食之或云好睡郭子横云五味草初生味甘花時酢食之不使人睡亦名却睡草又神異經云四味朩一名如之何其實有核形如棗子長五尺金刀割則苦竹刀割則飴朩刀割則酸蘆刀割則辛此說小類五味草也又御覧顧凱之啟䝉記曰如何隨刀而改味也水韭生於池塘中葉似韭有二三尺者五六月堪食不葷而脆得非龍爪薤乎郭子横云龍爪薤有長七尺者字林云薟音嚴水中野韭也又音呤見字林似蒜生水中鄭䖍云薤辛除園河西長二尺塞北山谷間多孝文韭軍人食之周孝文帝所植如渭水原諸葛亮韭亦諸葛所種也酈善長又云平樂村五六里至東亭杜北山甚髙峻上合下空東西廣二丈許髙起如屋中有石床傍生野韭人往乞者神許則風必偃之方可揃也如過越不偃而揃者有咎盛𢎞之荆州記亦具文小異蕹菜葉如栁三月生性冷味甜土人織葦簰長丈餘闊三四尺植於水上其根如萍寄水上下可和畦賣也陳藏器又云蕹菜味苦平無毒主解胡蔓草毒胡蔓即冶葛也本草云鈎吻又名冶葛用羊血土漿解之南州異物志曰俚賦呼冶葛為鈎挽鄭廣文又曰人自來求死者取一二葉手挼汁岀飲之半日死羊食苗大肥亦如巴豆䑕食則肥乃物有相伏如此者先食蕹菜後食冶葛二物相伏自然無苦取汁滴冶葛苖當時瘀死廣州記曰菜水生以為葅土人重之愚按廣之菜有掉字林掉辛菜也東風廣州記菜陸生置肥肉作羮味如酪香氣似馬蘭又左思吳都賦東風扶留是也蕋音戢風土記曰蕋香菜根似菜根蜀人所謂葅香也越絶書蕺山越王勾踐種蕺處音晶􅝀茨苖也東觀漢記王莽末南方枯旱民餓羣入野澤掘􅝀茨而食之類無足竒者是不復遍録吳志曰孫皓時有蕒音買菜生髙四尺厚三寸分如琵琶形兩邉生葉皓以為平盧晋安帝紀曰義熈二年有苦蕒菜生揚州中興書曰草妖也是後嵗嵗征伐民人稍苦苦蕒者買苦也國初建達國獻佛土菜一莖五葉花赤中心正黄而蘂紫色泥婆羅國獻稜類紅藍實似蒺藜火熟之能益食味又醋菜狀似慎火葉闊而長味如美酢絶宜人味極美斑皮竹笋湘源縣十二月食斑皮竹笋滋味與北中七八月笋牙小類但甜脆過之諸笋無以及之吳録云馬援至荔浦見冬笋名曰苞笋其味美於春夏笋也即鷄脛竹笋博物志曰斑皮竹洞庭之山堯帝之二女以涕揮竹竹盡斑也爾雅曰笋竹之萌說文曰笋竹胎詩義䟽笋皆四月生也巴竹笋八月生篃音媚竹笋冬夏生永嘉記含墮竹笋六月生篃竹譜棘竹落人鬚髮愚按山海經竹生花其年便枯六十年一易根必結實而枯死實落土復生六年還成町也竹譜曰竹不剛不柔非草非朩䈙必六十􅘽亦六年是也凡種竹正二月斸取西南根東北角種之竹性向西南引也齊民要術曰諺云東家種竹西家治地故也南中有以竹為刀錯子者錯子即􅓁簩竹皮為之錯指甲利勝於鐵機巧李衙推昉云如小鈍復以漿水洗之如初刀子竹裴淵廣州記云石林竹勁利削為刀切截象皮如截芋也公路襄州宜城縣朩香村有莊咸通初忽生異竹第一年生九竿第二年生七竿爾來嵗嵗有也作深梔黄色每節及枝上並抹緑鮮澄其笋甚美按顧凱之譜中亦無說處異苑曰東陽留道徳元嘉四年筯竹林忽生連理野人無知謂為禍祟伐煞之公路乾符初經過夏口時有人獻合歡笋於韋公尚書者自一本分為兩岐長二尺餘乃笋之瑞也公命公路為七字句歌之詞繁不載愚傳聞貞元五年秋畨禺有海户犯塩禁者避罪於羅浮山深入至第十三嶺山有十五嶺四百三十二峰九百八十三飛泉洞府也遇巨竹百千萬竿連亘巖谷竹圍二十一尺有三十九節節長二丈即由梧類也海户因破之為篾㑹罷吏捕逐遂挈而歸時有軍人獲一篾以為竒者後獻於刺史李復復命陸子羽圖而記之亦資耳目之一事也舊記云李公顧謂門生廣州桑苧翁曰夫視聽之外經籍未録不合有而有者不知其極况兹竹載在圖記不足竒也漢太尉許慎說文有長節竹謂之䇗音鐘一本作得非羅浮山龍鍾之義耶桑苧翁前席而言曰頃天寳末有韋長史虚舟寓於廬山瀑布泉時夏月多雨見瀑布之中流岀一桃葉闊五寸長一尺二寸至徳初徐正字嶷於海塩縣白塔山沙渚之上得一桃核片可貯一升則知草朩在山海之間有瑰形殊狀者多矣又若決明慎火在中原為蘇蓼葵莧之屬若生嶺嶠南山澗無非髙樹蕨有千嵗者徑二尺圍與彼不異北户録卷二
