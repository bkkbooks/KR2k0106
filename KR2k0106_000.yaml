body:
  text: 北戶録地理類八雜記之屬提要臣等謹案北戶録三卷唐段公路撰學海類編作公璐蓋字之訛新唐書藝文志稱為宰相文昌之孫則當為臨淄人學海類編作東牟人亦未詳所本其厯仕始末不可考惟據書首結銜知官京兆萬年縣尉據書中稱咸通十年知為懿宗時人而己是書載嶺南風土頗為賅備而于物産為尤詳其徴引亦極賅洽如淮南萬畢術廣志南越志南裔異物志㑹要靈枝圖說陳藏器本草唐韻郭緣生述征記臨海異物志陶朱公養魚經名苑毛詩義船神記字林廣州記扶南𫝊諸書今皆散佚藉此略見一二即所引張華博物志多今本所無亦藉此以考證真僞條下注文頗為典贍題登仕郎前參軍龜圖𫝊不題其姓似為公路之族然唐書宰相世系表不載其名莫知其審矣唐書藝文志作北户雜録疑𫝊寫誤衍一雜字其作三卷則與此本合學海類編所載惟存一卷凡物産五十一條不為完本曹溶所録古書往往如是不足深詰也乾隆四十六年四月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀北户録原序詩人之作本於風俗大抵以物類比興達乎情性之源自非觀化察時周知民俗之事博聞多見曲盡萬物之理者則安足以藴為六義之奧流為絃歌之美哉由是言之則古之學者固不厭博博而且信君子難之東牟段君公路鄒平公之孫也自未能把筆愛以指畫地如文字及六七嵗受學果能强力不罷其學尤長仄僻人所不能知者媷乎羣籍之中仡仡然有餘力間者以事南逰五嶺間常采其民風土俗飲食衣製歌謡哀樂有異於中夏者録而志之至於草木果蔬蟲魚羽毛之類有瑰形詭狀者亦莫不畢載非徒止於所聞見而己又能連類引證與竒書異說相參驗真所謂博而且信者矣噫近日著小說者多矣大率皆鬼神變怪荒唐誕妄之事不然則滑稽詼諧以為笑樂之資離此二者或强言故事則皆詆訾前賢使悠悠者以為口實此近世之通病也如君所言皆無有是其著於録者悉可考驗此蓋博物之一助豈徒為談端而已乎君以豫往從事嶺南備核其實請豫序以為證豫嘗觀圗於書府君狀貌一似鄒平公而又能以文學世其家於乎鄒平公為有後矣因為之序而不辭右拾遺內供奉陸希聲撰
