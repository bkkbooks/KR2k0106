body:
  text: 北户録卷三唐段公路撰龜圖注無核荔枝南方果之美者有荔枝衛洪七開曰蒲桃龍目椰子欐支欐同荔梧州火山者夏初先熟而味小劣其髙潘州者最佳五六月方熟有無核類雞卵大者其肪瑩白不減水精性熱液甘乃竒實也又有蠟荔枝作青黃色亦絶美南越志云荔枝洲有焦核黃蠟者為優故廣州記曰荔枝如雞卵大殼朱肉白五六月熟核若雞舌香陳藏器曰荔枝樹冬青實如雞子核黃黑似熟蓮子實白如肪甘而多汁百鳥食之為肥極宜人廣志云焦核胡􅦲此最美次有鱉卵焉其樹自合抱至數圍大者材中梁棟其堅即佉陀等朩無以加也嶺中荔枝才盡龍眼子方熟大如彈丸皮褐肉白而味過甜俗呼為荔枝奴非虛語耳修文殿御覽云龍眼子一名龍目左思蜀都賦云旁挺龍目側生荔枝也又西京雜記曰尉他獻髙祖鮫魚欐枝髙祖報以蒲桃錦四匹變柑新州出變柑有苞大於升者但皮薄如洞庭之橘餘柑之所弗及傳云本自髙要移植不數百里形味俱變因以為名論其美直所謂厥包橘柚精者柑見郭璞讃又馬援好事至荔浦見冬筍名包筍上言禹貢厥包橘柚疑即此也亦如踰淮為枳乃水土異也愚按吕氏春秋果之美者江浦之橘箕山之東清馬之所有櫨橘焉說文櫨橘柚也又郭璞曰蜀中有給客橙即櫨橘冬夏花實相繼風土記柑有黃者赭者赭赤謂之胡柑今人多引江陵千樹橘為朩奴事此漢書云其人與千户侯等且襄陽記李衡為丹陽太守衡密遣十人於武陵龍陽洲上作宅種柑千樹臨死勑兒曰汝毋惡吾治家固窮如是吾州里有千頭朩奴不責汝衣食嵗上一匹絹亦足用耳吳末衡柑成嵗得絹數千匹據此非橘明矣據雜書如翰林要海御覽賈思協皆列在黃柑門中愚又按諺云朩奴千無凶年要術云蓋言果實可以市易五榖此即朩奴之號果之都稱者也山橘子山橘子冬熟有大如土瓜者次如彈丸者皮薄下氣普寧多之南人以蜜漬和皮而食作琥珀色滋味絶佳豈比漢人之吳合皮啖橘以為笑也其葉煎之和酒飲亦療氣神驗愚憶王壇臨海異物志曰雞橘子如指頭大味甘永寧界中有之又裴淵廣州記羅浮山有橘夏熟實大如李又云羅浮有壺橘十種豈其一歟廣州記又云荔枝壺橘珍果之上今有枸櫞皮煎椰子煎皆竒味也異物志枸櫞實似橘皮不香椰子去其外皮及殼有白穰食之如北中生胡桃味又有白漿如乳人亦食之異物志曰椰子有如兩眼俗人謂之越王頭南人取為瓶子杓子等器枸櫞子即交州黃淡子橘柚類也橄㰖子橄㰖子八九月熟其大如棗廣志云有大如雞子者南人重其真味一說香口絶勝雞舌香詩義疏梅亦可合而香口又廣州亷薑亦可香口亦堪煮飲飲之能消酒煎法銼去兩頭煨溫煮之甚香美其樹聳拔其柯不喬有野生者髙不可梯但刻其根方數寸許內鹽於中一夕子皆落矣今髙涼有銀坑橄㰖子生於銀坑之側相傳是馮盎之家昔掘地遇於此細長多味美於諸郡産者其價亦貴於常者數倍也愚按南越志博羅縣有合成樹樹去地二丈為三衢山海經云四衢東向一衢為朩威南向一衢為橄㰖西向一衢為玉文顧微廣州記曰朩威髙大子如橄㰖而堅削去皮以為粽廣志書此橄㰖字南州異物志作此橄槄字陳藏器云其朩主䲅魚毒此朩作楫撥著䲅魚皆浮出其畏如此人中䲅魚肝子毒者必死也山胡桃山胡桃皮厚底平狀如檳榔其仁如扶容頭味次隂平樂遊胡桃别作杏膏香但不耐停耳廣志云隂平胡桃皮脆急投之即碎其蝦蟇背見栁世隆謝樂遊胡桃云胡羯奔逃吉之先見者也鄭䖍又云山胡桃無穰實心磨之可為印子據說即非南山中胡桃也白楊梅楊梅葉如龍眼樹冬青一名朹音求潘州有白色者甜而絶大鄭公䖍云越州容山有白熟楊梅兼名苑云東興縣有大如雞卵楊梅博物志云地有章名則多楊梅得非誤耶南越志安章縣白蜀里多楊梅求之曰白蜀去章逺矣吳興記曰故章縣北有石栁山出楊梅常以貢御張華所謂地名章必生楊梅蓋謂此也偏核桃占卑國出偏核桃形如半月狀波斯取仁食之絶香美極下氣力比於中夏桃仁療疾不殊㑹最云偏桃仁勃律國尤多花殷紅色郎中解忠順使安西以蘿蔔插接之而生桃仁肥大其桃皮不堪食解忠順郎中使安西以異方枝插蘿蔔至此皆活又吐谷渾有桃如一石甕大者貞觀二十一年三月十一日以逺夷各貢方物其草朩雜物有異於常者詔所司詳録焉華護獻馬乳蒲桃一房長二尺子亦稱大其色紫康國又獻金銀桃詔令植於苑圃紅梅嶺之梅小於江左居人採之雜以豆花漏花白色穗尖微紅南方草朩狀曰漏樹子大如李實二月花七月熟出興古書此字又劉欣其交州記作竇廣志作豆茠字也構櫞子朱槿之類顔之推云枸櫞子似橘大如飯簇字林音矩椽又按梁朝上饌糝奠合子內有根櫞是也又朱槿四時常有花可食此蕣朩也一名董一名櫬莊子云朝又張華云君子國多蕣華之革朝生夕死和鹽曝之梅為槿花所染其色可愛今嶺北呼為紅梅是也又有選大梅刻鏤瓶罐結帶之類取棹汁漬之棹朩葉烹其葉呼為棹汁按梅有紫花梅同心梅麗支梅品第絶多亦甚甘脆按鄭公䖍云婆㺯迦朩出烏萇國發地叢生葉大如掌花白而細絶芳香子如升大花披之時人即雕畫瓦罐承花候其子長滿罐中即破而取之文彩彬煥與畫罐相類便以獻王猶中國鏤梅諸國所無也五色藤筌蹄瓊州出五色藤合子書囊之類花多織走獸飛禽細於錦綺亦藤工之妙手也次盧亭盧亭即盧循之苖裔也細白藤為茶器新州作五色藤筌臺皆一時之精絶昔梁劉孝儀謝太子五色藤筌蹄一枚云炎州采藤麗窮綺縟得非筌臺與筌蹄語訛歟按侯景篡位著白紗帽而尚青袍或牙梳插髻牀上常設胡牀大業記帝九月自北塞還東都賜文武官各有差胡牀為交牀改胡瓜為白露黃瓜改茄子為崑崙紫瓜也及筌蹄今海豐嵗貢五色藤鏡匣一筌臺一是也又本行經云河龍女名尼連茶耶上太子寶筌㮛太子坐之食乳糜巳擲鉢河中天帝取歸忉利供養以立鉢節佛經又云太子第七日據筌蹄坐受與即輸陀指印環云云香皮紙羅州多棧香樹身如櫃栁其華繁白其葉似橘皮堪搗紙土人號為香皮紙作灰白色文如魚子箋今羅辨州皆用之三輔故事云衛太子以紙蔽鼻前漢巳有之非蔡倫造也此蓋言其善不云創耳又和熹鄧后貢獻悉斷嵗時但供紙筆而巳然則其用久矣但不知何物為之按王隱晋書曰王隱答華恆云魏太和六年河間張楫士古今字詁其中部云今紙也古之素帛依書長短隨事截絹狀數重沓即明幡紙字從糸此形聲貧者無之故溫舒截蒲寫也和帝元興元年中常侍蔡倫挫故布網搗作紙字從巾又是其聲雖同糸巾則殊不言古紙為今紙又山謙之丹陽記曰平準署有紙官古以縑素為書記又以竹為簡牘其貧諸生或用蒲為牒也瑶山玉彩亦具小不及桑根竹莫紙睦州出之松皮紙日本國出側理紙也側理陟釐也後人說呼釐為側理即苔也事見張華又爾雅曰苔石衣也郭璞注水苔也一名石髮江東食之又瑶山玉彩載薛道衡詠苔紙詩云昔時應春色引緑泛清流今來承玉管布字轉銀鈎又嘗讀謝康樂山居賦云剝芨音及巖椒言芨皮可為紙未詳其朩也又扶桑國在中國之東二萬里其土多扶桑朩故以為名扶桑葉似桐初生如笋國人食之實如梨而赤績其皮為布以為衣亦以皮為紙齊永元二年其國有沙門慧深來至荆州者其香即㑹最云沉香青桂雞骨馬蹄棧香黃熟同是一樹如一朩五香根檀節沉子雞舌葉藿膠薰陸也金樓子云衆香共是一樹又俞益期箋曰衆香共一朩也又真誥經云屢燒香左右令人魄正故隱居云沉香薰陸夏月常燒此二物梁簡文時扶南信有沉香一婆羅丁云婆羅丁五百六十斤也按浴佛功德經云牛頭旃檀芎藭鬱金龍腦沉麝丁等以為湯置淨器中次第浴之及旃檀云王有疾醫須旃檀汁旃檀枝葉根莖除一切疾本草云白檀消風熱腫毒又無名詩集武舍之中行云胡從何等來氍㲣翕毛㲪五朩香證俗音云㿞數毛席也書此字又通俗云織毛褥也魏略云大秦國以野繭織成出黃白黑緑紫絳紺金黃縹留黃十種氍㲣又通俗云白氍㲣細者謂之翕毛㲪又書云翕毛㲪施大牀之前小榻之上也又異苑云沙門支法存有八尺沉香板牀有八尺翕毛㲪作百種形象迷迭迷迭香大秦出魏文帝曰余種迷迭於中庭嘉其揚條吐秀馥有香芳又陳琳賦曰方碧莖之阿那鋪緑葉之蜿蟺艾納艾納出驃國此香燒之斂香氣能令不散直上似細艾也及都梁都梁香荆州記都梁縣有小山山上清水淺中生蘭草俗謂之都梁即以縣名焉唯交州異物志曰密香欲取先斷其根經年外皮爛中心及節堅黑者置水中則沉是謂沉香次有置水中不沉與水面平者名棧香其最小粗者名曰槧香佛經所謂沉水者也又南越志謂之香朩出日南也枹朩屧枹朩産水中葉細如檜其身堅類於柏唯根軟不勝刀鋸今潮州新州多刳之為屧或油畫或金漆其輕不讓草屧齊民要術云青白桐村者並堪師長者皆著木屐婦女始嫁漆畫為屐五采為系也又按梁武小說介子推逃祿隱跡抱樹燒死文公拊朩哀嗟裁而製屐每懷割股之功輒俯視其屐曰悲乎足下足下之稱將此起乎按翔法師書云一名水松生水中無枝形如笋亦曰松枹今為屧是也又陳周𢎞正謝賚漆松枹屧云䝉此慈錫便得輕舉紅藤簟瓊州出紅簟一呼為笙或謂之蘧蒢亦謂之行唐方言曰簟朱魏之間謂之笙或謂蘧曲自關而西謂之簟其粗者謂之蘧蒢行唐似蘧蒢直文而粗自關而東周洛楚魏之間謂之倚佯佯音陽也南越志云桃枝南人以為笙郭景純曰簟以寧寢杖以扶危又簡文集有謝桃枝笙竹席箋沈約彈歙令仲文秀橫訂吏黃法先輸六赤笙四十領其色殷紅瑩而不垢或云染藤所製編織精華又不如溪鵠紅席海中溪鵠山去餘桃岸千餘里上有女冠道士四五百人學道梁時遣使獻紅席此草者紅鳥居其下故以為名耳竿散卧簟簡文謝云筠篁多品篠簜雜名椰子坐席亦有卧席具吳均集又沈約謝賜大甲坐卧簟竹帖蒲褥筍席王儉贈宗測見南史花紈卧簟月支毛席陸倕集具流黃簟象牙席西京雜記㑹稽供御竹簟世號為流黃簟神仙傳淮南王為八公設象牙席以為優劣歟方竹杖澄州産方竹體如削成徑健堪為杖亦不讓張騫筇竹杖也其融州亦出大者數丈正聲集云南方有方竹杖白蟬噪其上陳貞節嘗詠之又海晏地名出蘆堪為拄杖髙潘州出千嵗蕨拄杖小類貝多更有踈節竹五六尺一節僧道多以為杖皆竒物又按㑹最云溱川通竹直上無節空心也山花燕支山花叢生端州山崦間多有之其葉類藍其花似蓼抽穗長二三寸作青白色正月開土人採含苞者賣之用為燕支粉或持染絹帛其紅不下藍花作燕支法採花於鉢中細研著少水以生絹綟取汁於通油瓷瓶中文武火煎之候花浮上旋揉取生絹囊中瀝乾用如常燕支法云云博物志有作黃藍燕支法通典云今漢中嵗貢紅花百行燕支一升習鑿齒與謝侍中書云此有紅藍足下先知之否北方人採取其花染緋黃接其上英鮮者作燕支婦人粧時用作頰色作此法大如小豆許而按令扁色殊鮮明可愛吾小時再三過見燕支今日始覩紅藍耳後當為足下致其種胸奴名妻閼氏言可愛如燕支也閼字音燕氏字音支想足下先亦作此讀漢書也西河舊事歌曰失我祈連山使我六畜不蕃息失我燕支山使我婦女無顔色又鄭公䖍云石榴花堪作燕支代國長公主睿宗女也少嘗作燕支棄子於階後乃叢生成樹花實敷芬既而歎曰人生能幾我昔初笄嘗為燕支弃其子今成樹隂映瑣闥人豈不老乎鄭公䖍云塗林花有五色黃碧青白紅如杏花漢東都尉于吉獻一株花雜五色云是仙人杏今嶺中安石榴花實相間四時不絶亦有紺者古今注云燕支葉似蘇花似蒲云出西方土人以染名為燕支中國人亦謂紅藍以染粉為婦人面色謂之燕支粉博物志云張騫使西域還得大蒜安石榴胡桃蒲桃沙葱苜蓿胡荽黃藍可作燕支也紅花而出波斯踈勒河祿國今梁漢最上每嵗貢二萬斤於織染署鶴子草鶴子草蔓花也其花麴塵色淺紫帶葉如栁而小短當夏開南人云是媚草甚神可比懷草夢草似蒲畫縮入地夜乃出亦名夜草懷之則知夢之吉凶立驗也漢武思李夫人東方朔乃獻一枝帝懷之夜夢夫人因改此名為懷草也夢芝習鑿齒襄陽耆舊傳曰襄王夢一婦人曰我夏帝之季女也名瑶姬未行而死封於巫山之臺精魂為草摘而服為芝必與媚而服焉必與夢其家在宜城縣採之曝乾以代面靨形如飛鶴狀翅羽觜距無不畢備亦草之竒者草蔓上春生雙蟲常食其葉土人收於奩粉間飼之如養蠶法蟲老不食而蛻為蝶蝶赤黃色女子佩之如細鳥皮號為媚蝶郭子橫記勒畢國獻細鳥以方赤玉籠盛數百形大於蠅狀如鸚鵡聲聞數百里之間如黃鵠鳴也國人以此鳥候日晷亦曰候日蟲帝得之旬日飛盡明年有細鳥集於帷帟或入衣袖因名蟬衣宫內嬪御有鳥集其衣者輒䝉愛幸至武帝末稍稍自死人服其皮者多為丈夫所媚余訪花子事如面光眉翠月黃星靨其來尚矣而光具無名詩集月黃星靨娥黃婺靨皆數然事之相類者見拾遺引孫和恱鄧夫人常置膝上和月下舞水精如意誤傷夫人頰流血染袴和自䑛瘡太醫曰獺髓雜玉及琥珀屑當滅痕購以百金有富春漁人云獺神物也取則逃之伺祭魚時有鬬死穴者枯骨可合舂以滅痕和乃作膏琥珀太多痕未滅而類有赤㸃細視之更益其妍諸嬖要寵者以丹青㸃頰而後進幸又宋武帝夀陽公主人日梅花落額上成五出花後效為梅花粧也又書云以丹注面白的此本天子諸侯有羣妾者以次進御有月事者上御不口說注此於面一說上官昭容自製花子以掩黥處昭容儀之孫名婉兒天后時忤㫖當誅惜其才不殺而黥之又云天后每對宰臣令昭容卧於案裙下記所奏事一日宰相李忘名對事昭容竊窺上覺退朝怒甚取甲刀劄於面上不許拔昭容遽為乞拔刀子詩有集二十卷詩在集中𤣥宗收取其詩筆集之令張說為序集賢故事舊宣索書皆進副本無副本者則促功寫進後亦不能守其事如上官昭容舊無副本因宣索便進正本庫中今闕此書矣後為花子以掩痕也越王竹嚴州産越王竹根於石上狀若荻枝髙尺餘土人加其色用代酒籌次有沙筯産於海島間狀如蓴菜春吐黃花其心若骨可為籌筯凡欲採者須輕步拔之不爾聞人行聲則縮入沙中了不可取陳藏器云越王餘算味醎生南海算子長尺許異苑云晋安有越王餘算菜白者似骨黑者似角古云越王行海中作籌有餘弃之於水遂生焉臨海水土志曰越王算如笄大正白長尺餘生海邉沙中見便取之即可得心中存來取則入土中又逺飛云東海中筯洲洲上故筯無極連船取之不盡世中好失筯言天下筯悉歸於此乃驚耳之說也無名花廣州之南數百里有蔓草生焉其草吐一葉白華片大如掌亦有小片者蘂緑色初夏開玩之初誤殘花恬然特異遍問土人莫有知者昔草堂樓法師山居時法師慧約字德素梁國號也有一野嫗手持一樹植之於庭云是蜻蜓樹也所植樹嵗久芬芳鬱茂有一鳥身赤尾長栖息其上聘北道里記云朩龍寺寺有三層磚塔側生一大樹縈繞至塔頂枝幹交橫上平容十餘人坐枝杪四向下垂團團如百子帳經過莫有辨者梁武帝曽遣人圖寫樹形還都大體屈盤似龍因呼為朩龍寺又謝惠連目竒草曰仙人草序云余之中園有仙人草焉春穎其苖夏秀其英秋有貞實冬無凋色可謂四時而不改者也既嘉其名而美其質染筆作詠庶以攄述大業記又說仙人草如長樂髙三尺丹葉碧花花似雞幘而大者闊五六寸又梁伍安公武陵記云巴陵郡西有寺寺房牀下忽有樹生衆僧移屋避之晚更滋茂莫有認者外國沙門云是波羅密擲常著花細白永嘉四年忽生一花狀似芙蓉推其靈景未能量也又金樓子云孔子冡中樹在魯城百數皆異種也然小說云簡文初不别稻余今不分此亦何愧哉指甲花指甲花細白色絶芳香今蕃人重之但未詳其名也又耶悉弭花白末利花紅者不香皆波斯移植中夏如毗尸沙金錢花也本出外國大同二年始來中土今畨禺士女多以縷貫花賣之愚詳末利乃五印度華名佛書多載之貫華亦佛事也又扶南傳曰頓遜國有區撥花葉逆花致祭花各遂花摩夷花燥而合香末以為粉以粉身體唐初罽賔國獻俱物頭花丹白相間香氣逺聞伽失畢國獻泥樓鉢羅花如荷葉缺圓其花色碧蘂黃香聞數十步皆中國無者相思子蔓相思子有蔓生者本草拾遺六相思子樹髙大有文字赤黑間者佳又羅浮山記增城縣南廽溪之側多相思樹號相思亭送行之所贈也其子切紅葉如合歡依籬障而生合歡博物志云蠲忿古今注云嵇成種之舍前一名合昏亦名戎樹與龍腦闕相宜能令香不耗南人云有刀瘡血不止痛甚者取葉熟搗厚傅之即愈胡神記云東平劉羊兒居白沙村去城十許里常日晚行經一廟前忽拾得一紙裹芬香殊特開之皆是雜綵結紅色紐琉璃珠相思子遂持歸至夜開人叩户見一青衣稱淮南王女遣信向有輕贈幸䝉採納羊兒合語契其明夜女乃至年十五六容色殊麗至曉乃别後經旬日時時復來干寶搜神記云大夫韓慿妻美宋康王奪之慿怨王囚之慿自殺妻乃隂腐其衣王與之登臺自投臺下左右攬衣衣不中手遺書於帶願以尸骨賜韓氏而合葬王怒弗聽埋之令冡相望宿昔有文梓朩生二冡之端根交於下枝錯其上又有鴛鴦雌雄各一恆在樹上宋王哀之因號其朩曰相思樹聘北道里記引許有韓慿冡宋王史也四部目録有韓慿書叙事委悉而辭義鄙淺不復具記無名詩集又云昔有賢士姓韓名朋故娶賢良妻成公索之女名曰貞夫具賢具聖云云又三日三夜始得壙空不見韓朋貞夫唯見石子一雙鬱鬱葱葱一青一白宋王怪之分張其雙青石埋於道西白石埋於道東道東生桂樹道西生梧桐上枝相連下枝相通枝枝相交葉葉相䝉下有清流之水斷道不闕葉落兩兩成雙從明至暮悲鳴嗈嗈宋闕是何樹梁伯對曰此是韓朋貞闕心曰誰能解之梁伯答曰臣能闕中合中是思愛下有闕王妬其氣代遣踐殺之血流滂闕身黃髙闕一毛落鴛鴦同心異體頭白地七赤有强使者捉闕廽頭語左右驟往獻于宋王宋王將拂其闕輝鬱司與朕占相梁伯對闕輝鬱蒼蒼唯有項上少許無光將毛重拂致其殺傷空中有言曰不是鴛鴦舞媚毛此是韓朋報寃刀睡蓮一書瑞字睡蓮葉如荇而大沉於水面上有異浮根菱耳菱根出水上葉沈水下實細薄皮葉半青半白霜下彌香美因名青水芰見郭子橫書其花布葉數重不房而蘂凡五種色當夏晝開夜縮入水底晝復出也與夢草晝縮入地夜即復出一何背哉夢草似蒲色紅即方朔獻武帝者孫光憲續注曰從事江陵日寄住蕃客穆思密嘗遺水仙花數本如橘置於水器中經年不萎北戶録卷三
